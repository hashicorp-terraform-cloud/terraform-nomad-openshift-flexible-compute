---
# Required — passed from Terraform via AAP extra_vars
nomad_client_install_server_address: "{{ nomad_server_address | default('') }}"

# Package
nomad_client_install_package: "{{ nomad_package | default('nomad-enterprise') }}"
nomad_client_install_version: "{{ nomad_version | default('1.11.3+ent') }}"

# Direct download defaults by platform
nomad_client_install_install_dir_linux: "{{ nomad_install_dir_linux | default('/usr/local/bin') }}"
nomad_client_install_install_dir_macos: "{{ nomad_install_dir_macos | default('/usr/local/bin') }}"
nomad_client_install_install_dir_windows: "{{ nomad_install_dir_windows | default('C:\\Program Files\\Nomad') }}"

nomad_client_install_config_dir_linux: "{{ nomad_config_dir_linux | default('/etc/nomad.d') }}"
nomad_client_install_config_dir_macos: "{{ nomad_config_dir_macos | default('/etc/nomad.d') }}"
nomad_client_install_config_dir_windows: "{{ nomad_config_dir_windows | default('C:\\ProgramData\\Nomad\\config') }}"

nomad_client_install_data_dir_linux: "{{ nomad_data_dir_linux | default('/opt/nomad') }}"
nomad_client_install_data_dir_macos: "{{ nomad_data_dir_macos | default('/opt/nomad') }}"
nomad_client_install_data_dir_windows: "{{ nomad_data_dir_windows | default('C:\\ProgramData\\Nomad\\data') }}"

nomad_client_install_state_dir_linux: "{{ nomad_state_dir_linux | default(nomad_client_install_data_dir_linux ~ '/client') }}"
nomad_client_install_state_dir_macos: "{{ nomad_state_dir_macos | default(nomad_client_install_data_dir_macos ~ '/client') }}"
nomad_client_install_state_dir_windows: '{{ nomad_state_dir_windows | default([nomad_client_install_data_dir_windows, "client"] | join("\\")) }}'

nomad_client_install_platform_install_dir: >-
  {{ nomad_client_install_install_dir_windows if (ansible_os_family | default('')) == 'Windows'
  else (nomad_client_install_install_dir_macos if (ansible_system | default('')) == 'Darwin' else nomad_client_install_install_dir_linux) }}

nomad_client_install_install_dir: "{{ nomad_install_dir | default(nomad_client_install_platform_install_dir) }}"

nomad_client_install_platform_config_dir: >-
  {{ nomad_client_install_config_dir_windows if (ansible_os_family | default('')) == 'Windows'
  else (nomad_client_install_config_dir_macos if (ansible_system | default('')) == 'Darwin' else nomad_client_install_config_dir_linux) }}

nomad_client_install_config_dir: "{{ nomad_config_dir | default(nomad_client_install_platform_config_dir) }}"

nomad_client_install_platform_data_dir: >-
  {{ nomad_client_install_data_dir_windows if (ansible_os_family | default('')) == 'Windows'
  else (nomad_client_install_data_dir_macos if (ansible_system | default('')) == 'Darwin' else nomad_client_install_data_dir_linux) }}

nomad_client_install_data_dir: "{{ nomad_data_dir | default(nomad_client_install_platform_data_dir) }}"

nomad_client_install_platform_state_dir: >-
  {{ nomad_client_install_state_dir_windows if (ansible_os_family | default('')) == 'Windows'
  else (nomad_client_install_state_dir_macos if (ansible_system | default('')) == 'Darwin' else nomad_client_install_state_dir_linux) }}

nomad_client_install_state_dir: "{{ nomad_state_dir | default(nomad_client_install_platform_state_dir) }}"

nomad_client_install_service_name: "{{ nomad_service_name | default('nomad') }}"
nomad_client_install_launchd_label: "{{ nomad_launchd_label | default('com.hashicorp.nomad') }}"
nomad_client_install_launchd_plist_path: "{{ nomad_launchd_plist_path | default('/Library/LaunchDaemons/com.hashicorp.nomad.plist') }}"

nomad_client_install_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"
  arm64: "arm64"
  s390x: "s390x"
  AMD64: "amd64"
  64-bit: "amd64"

nomad_client_install_download_url: >-
  {{ [
    'https://releases.hashicorp.com/nomad',
    nomad_client_install_version,
    'nomad_' ~
    nomad_client_install_version ~
    '_' ~
    (ansible_system | lower) ~
    '_' ~
    (nomad_client_install_arch_map[ansible_architecture] | default('amd64')) ~
    '.zip'
  ] | join('/') }}

nomad_client_install_windows_download_url: >-
  {{ [
    'https://releases.hashicorp.com/nomad',
    nomad_client_install_version,
    'nomad_' ~
    nomad_client_install_version ~
    '_windows_' ~
    (nomad_client_install_arch_map[ansible_architecture] | default('amd64')) ~
    '.zip'
  ] | join('/') }}

# Configuration
nomad_client_install_datacenter: "{{ nomad_datacenter | default('dc1') }}"
nomad_client_install_region: "{{ nomad_region | default('global') }}"
nomad_client_install_intro_token: "{{ nomad_client_intro_token | default('') }}"

# Enterprise license (optional — can also be set via NOMAD_LICENSE env var)
nomad_client_install_license: "{{ nomad_license | default('') }}"
