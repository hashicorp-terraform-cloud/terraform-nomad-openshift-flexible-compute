---
- name: Enable and start Nomad service (Linux)
  ansible.builtin.service:
    name: "{{ nomad_client_install_service_name }}"
    state: started
    enabled: true
  when: ansible_facts["system"] == "Linux"

- name: Enable and start Nomad service (macOS)
  ansible.builtin.shell: |
    if launchctl print system/{{ nomad_client_install_launchd_label }} >/dev/null 2>&1; then
      launchctl kickstart -k system/{{ nomad_client_install_launchd_label }}
    else
      launchctl bootstrap system "{{ nomad_client_install_launchd_plist_path }}"
    fi
  args:
    executable: /bin/bash
  changed_when: true
  when: ansible_facts["system"] == "Darwin"

- name: Enable and start Nomad service (Windows)
  ansible.windows.win_service:
    name: "{{ nomad_client_install_service_name }}"
    state: started
    start_mode: auto
  when: ansible_facts["os_family"] == "Windows"
