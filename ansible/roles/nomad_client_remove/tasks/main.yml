---
- name: Determine package-managed remove support
  ansible.builtin.set_fact:
    nomad_client_remove_use_package_manager: >-
      {{
        (ansible_facts["os_family"] in ["RedHat", "Debian"])
        and (ansible_facts.get("distribution", "") != "Amazon")
      }}

- name: Build Nomad CLI environment for remove workflow
  ansible.builtin.set_fact:
    nomad_client_remove_nomad_env: >-
      {{
        {}
        | combine(
            (nomad_client_remove_nomad_addr | trim | length > 0)
            | ternary({'NOMAD_ADDR': nomad_client_remove_nomad_addr | trim}, {})
          )
        | combine(
            (nomad_client_remove_nomad_token | trim | length > 0)
            | ternary({'NOMAD_TOKEN': nomad_client_remove_nomad_token | trim}, {})
          )
      }}
  when: (nomad_client_remove_drain_before_uninstall | bool) or (nomad_client_remove_purge_node | bool)

- name: Resolve Nomad API address for node purge
  ansible.builtin.set_fact:
    nomad_client_remove_nomad_addr_purge: >-
      {{
        (nomad_client_remove_nomad_addr | trim)
        if (nomad_client_remove_nomad_addr | trim | length > 0)
        else (
          ('http://' ~ (nomad_client_remove_nomad_server_address | trim) ~ ':4646')
          if (nomad_client_remove_nomad_server_address | trim | length > 0)
          else ''
        )
      }}
  when: nomad_client_remove_purge_node | bool

- name: Build Nomad CLI environment for node purge
  ansible.builtin.set_fact:
    nomad_client_remove_nomad_env_purge: >-
      {{
        {}
        | combine(
            (nomad_client_remove_nomad_addr_purge | trim | length > 0)
            | ternary({'NOMAD_ADDR': nomad_client_remove_nomad_addr_purge | trim}, {})
          )
        | combine(
            (nomad_client_remove_nomad_token | trim | length > 0)
            | ternary({'NOMAD_TOKEN': nomad_client_remove_nomad_token | trim}, {})
          )
      }}
  when: nomad_client_remove_purge_node | bool

- name: Disable node eligibility before uninstall (POSIX)
  ansible.builtin.command:
    argv:
      - nomad
      - node
      - eligibility
      - -disable
      - -self
  environment: "{{ nomad_client_remove_nomad_env }}"
  register: nomad_client_remove_disable_eligibility_posix
  changed_when: nomad_client_remove_disable_eligibility_posix.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["system"] in ["Linux", "Darwin"]

- name: Drain node before uninstall (POSIX)
  ansible.builtin.command: >-
    nomad node drain -enable -yes -deadline={{ nomad_client_remove_drain_deadline }}
    {% if nomad_client_remove_drain_force | bool %}-force{% endif %}
    -self
  environment: "{{ nomad_client_remove_nomad_env }}"
  register: nomad_client_remove_drain_posix
  changed_when: nomad_client_remove_drain_posix.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["system"] in ["Linux", "Darwin"]

- name: Disable node eligibility before uninstall (Windows)
  ansible.windows.win_shell: |
    $env:NOMAD_ADDR = "{{ nomad_client_remove_nomad_env.NOMAD_ADDR | default('') }}"
    $env:NOMAD_TOKEN = "{{ nomad_client_remove_nomad_env.NOMAD_TOKEN | default('') }}"
    & "{{ nomad_client_remove_install_dir }}\nomad.exe" node eligibility -disable -self
  register: nomad_client_remove_disable_eligibility_windows
  changed_when: nomad_client_remove_disable_eligibility_windows.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["os_family"] == "Windows"

- name: Drain node before uninstall (Windows)
  ansible.windows.win_shell: |
    $env:NOMAD_ADDR = "{{ nomad_client_remove_nomad_env.NOMAD_ADDR | default('') }}"
    $env:NOMAD_TOKEN = "{{ nomad_client_remove_nomad_env.NOMAD_TOKEN | default('') }}"
    $drainArgs = @(
      'node', 'drain',
      '-enable',
      '-yes',
      '-deadline={{ nomad_client_remove_drain_deadline }}',
      {% if nomad_client_remove_drain_force | bool %}'-force',{% endif %}
      '-self'
    )
    & "{{ nomad_client_remove_install_dir }}\nomad.exe" @drainArgs
  register: nomad_client_remove_drain_windows
  changed_when: nomad_client_remove_drain_windows.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["os_family"] == "Windows"

- name: Build Nomad API headers for allocation checks
  ansible.builtin.set_fact:
    nomad_client_remove_nomad_api_headers: >-
      {{
        {}
        | combine(
            (nomad_client_remove_nomad_token | trim | length > 0)
            | ternary({'X-Nomad-Token': nomad_client_remove_nomad_token | trim}, {})
          )
      }}
  when: nomad_client_remove_drain_before_uninstall | bool

- name: Lookup self node ID (POSIX)
  ansible.builtin.command:
    argv:
      - nomad
      - node
      - status
      - -self
      - -json
  environment: "{{ nomad_client_remove_nomad_env }}"
  register: nomad_client_remove_self_node_status_posix
  changed_when: false
  failed_when: false
  when:
    - (nomad_client_remove_drain_before_uninstall | bool) or (nomad_client_remove_purge_node | bool)
    - ansible_facts["system"] in ["Linux", "Darwin"]

- name: Query self node allocations (POSIX)
  ansible.builtin.uri:
    url: >-
      {{
        (nomad_client_remove_nomad_env.NOMAD_ADDR | default('http://127.0.0.1:4646'))
        ~ '/v1/node/'
        ~ ((nomad_client_remove_self_node_status_posix.stdout | from_json).ID)
        ~ '/allocations'
      }}
    method: GET
    headers: "{{ nomad_client_remove_nomad_api_headers }}"
    return_content: true
  register: nomad_client_remove_self_allocations_posix
  changed_when: false
  failed_when: false
  until: >-
    (
      (nomad_client_remove_self_allocations_posix.json | default([]))
      | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
      | list
      | length
    ) == 0
  retries: "{{ nomad_client_remove_allocations_wait_retries }}"
  delay: "{{ nomad_client_remove_allocations_wait_delay_seconds }}"
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["system"] in ["Linux", "Darwin"]
    - nomad_client_remove_self_node_status_posix.rc == 0

- name: Fail when active allocations remain on self node (POSIX)
  ansible.builtin.assert:
    that:
      - >-
        (
          nomad_client_remove_self_allocations_posix.json
          | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
          | list
          | length
        ) == 0
    fail_msg: >-
      Active allocations remain on self node after drain.
      Remaining allocation IDs: {{
        nomad_client_remove_self_allocations_posix.json
        | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
        | map(attribute='ID')
        | list
      }}
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["system"] in ["Linux", "Darwin"]
    - nomad_client_remove_self_node_status_posix.rc == 0

- name: Lookup self node ID (Windows)
  ansible.windows.win_shell: |
    $env:NOMAD_ADDR = "{{ nomad_client_remove_nomad_env.NOMAD_ADDR | default('') }}"
    $env:NOMAD_TOKEN = "{{ nomad_client_remove_nomad_env.NOMAD_TOKEN | default('') }}"
    $selfNode = & "{{ nomad_client_remove_install_dir }}\nomad.exe" node status -self -json
    ($selfNode | ConvertFrom-Json).ID
  register: nomad_client_remove_self_node_id_windows
  changed_when: false
  failed_when: false
  when:
    - (nomad_client_remove_drain_before_uninstall | bool) or (nomad_client_remove_purge_node | bool)
    - ansible_facts["os_family"] == "Windows"

- name: Query self node allocations (Windows)
  ansible.windows.win_uri:
    url: >-
      {{
        (nomad_client_remove_nomad_env.NOMAD_ADDR | default('http://127.0.0.1:4646'))
        ~ '/v1/node/'
        ~ (nomad_client_remove_self_node_id_windows.stdout | trim)
        ~ '/allocations'
      }}
    method: GET
    headers: "{{ nomad_client_remove_nomad_api_headers }}"
  register: nomad_client_remove_self_allocations_windows
  changed_when: false
  failed_when: false
  until: >-
    (
      (nomad_client_remove_self_allocations_windows.json | default([]))
      | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
      | list
      | length
    ) == 0
  retries: "{{ nomad_client_remove_allocations_wait_retries }}"
  delay: "{{ nomad_client_remove_allocations_wait_delay_seconds }}"
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_self_node_id_windows.rc == 0
    - (nomad_client_remove_self_node_id_windows.stdout | default('') | trim | length) > 0

- name: Normalize self node allocations response (Windows)
  ansible.builtin.set_fact:
    nomad_client_remove_self_allocations_windows_list: >-
      {{
        nomad_client_remove_self_allocations_windows.json | default([])
      }}
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_self_node_id_windows.rc == 0
    - (nomad_client_remove_self_node_id_windows.stdout | default('') | trim | length) > 0

- name: Fail when active allocations remain on self node (Windows)
  ansible.builtin.assert:
    that:
      - >-
        (
          nomad_client_remove_self_allocations_windows_list
          | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
          | list
          | length
        ) == 0
    fail_msg: >-
      Active allocations remain on self node after drain.
      Remaining allocation IDs: {{
        nomad_client_remove_self_allocations_windows_list
        | rejectattr('ClientStatus', 'in', ['complete', 'failed', 'lost'])
        | map(attribute='ID')
        | list
      }}
  when:
    - nomad_client_remove_drain_before_uninstall | bool
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_self_node_id_windows.rc == 0
    - (nomad_client_remove_self_node_id_windows.stdout | default('') | trim | length) > 0

- name: Stop Nomad service (Linux)
  ansible.builtin.service:
    name: "{{ nomad_client_remove_service_name }}"
    state: stopped
    enabled: false
  register: nomad_client_remove_stop_service_linux
  failed_when: false
  when: ansible_facts["system"] == "Linux"

- name: Stop Nomad service (macOS)
  ansible.builtin.shell: |
    if launchctl print system/{{ nomad_client_remove_launchd_label }} >/dev/null 2>&1; then
      launchctl bootout system/{{ nomad_client_remove_launchd_label }}
    fi
  args:
    executable: /bin/bash
  changed_when: true
  failed_when: false
  when: ansible_facts["system"] == "Darwin"

- name: Stop Nomad service (Windows)
  ansible.windows.win_service:
    name: "{{ nomad_client_remove_service_name }}"
    state: stopped
    start_mode: disabled
  register: nomad_client_remove_stop_service_windows
  failed_when: false
  when: ansible_facts["os_family"] == "Windows"

- name: Purge node from Nomad server list (POSIX)
  ansible.builtin.command:
    argv:
      - nomad
      - node
      - purge
      - -yes
      - "{{ (nomad_client_remove_self_node_status_posix.stdout | from_json).ID }}"
  environment: "{{ nomad_client_remove_nomad_env_purge }}"
  register: nomad_client_remove_purge_posix
  changed_when: nomad_client_remove_purge_posix.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_purge_node | bool
    - ansible_facts["system"] in ["Linux", "Darwin"]
    - nomad_client_remove_self_node_status_posix.rc == 0

- name: Purge node from Nomad server list (Windows)
  ansible.windows.win_shell: |
    $env:NOMAD_ADDR = "{{ nomad_client_remove_nomad_env_purge.NOMAD_ADDR | default('') }}"
    $env:NOMAD_TOKEN = "{{ nomad_client_remove_nomad_env_purge.NOMAD_TOKEN | default('') }}"
    & "{{ nomad_client_remove_install_dir }}\nomad.exe" node purge -yes "{{ nomad_client_remove_self_node_id_windows.stdout | trim }}"
  register: nomad_client_remove_purge_windows
  changed_when: nomad_client_remove_purge_windows.rc == 0
  failed_when: false
  when:
    - nomad_client_remove_purge_node | bool
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_self_node_id_windows.rc == 0
    - (nomad_client_remove_self_node_id_windows.stdout | default('') | trim | length) > 0

- name: Recommend node purge when deleting client state
  ansible.builtin.debug:
    msg: >-
      Recommendation: nomad_client_remove_delete_state=true removes Nomad client identity
      state (node ID). Set nomad_client_remove_purge_node=true to remove stale node
      entries from the Nomad client list.
  when:
    - nomad_client_remove_delete_state | bool
    - not (nomad_client_remove_purge_node | bool)

# --- Package manager removal (RedHat / Debian) ---

- name: Remove Nomad package(s)
  ansible.builtin.package:
    name: "{{ nomad_client_remove_packages }}"
    state: absent
  when: nomad_client_remove_use_package_manager

- name: Remove HashiCorp yum repository
  ansible.builtin.yum_repository:
    name: hashicorp
    state: absent
  when:
    - nomad_client_remove_use_package_manager
    - ansible_facts["os_family"] == "RedHat"

- name: Remove HashiCorp apt repository
  ansible.builtin.apt_repository:
    repo: "deb https://apt.releases.hashicorp.com {{ ansible_facts['distribution_release'] }} main"
    state: absent
  when:
    - nomad_client_remove_use_package_manager
    - ansible_facts["os_family"] == "Debian"

- name: Remove HashiCorp GPG key
  ansible.builtin.apt_key:
    url: https://apt.releases.hashicorp.com/gpg
    state: absent
  when:
    - nomad_client_remove_use_package_manager
    - ansible_facts["os_family"] == "Debian"

# --- Direct download removal (Linux, non-package) ---

- name: Remove Nomad binary
  ansible.builtin.file:
    path: "{{ nomad_client_remove_install_dir }}/nomad"
    state: absent
  when:
    - ansible_facts["system"] in ["Linux", "Darwin"]
    - not nomad_client_remove_use_package_manager

- name: Remove Nomad systemd unit
  ansible.builtin.file:
    path: /etc/systemd/system/nomad.service
    state: absent
  when:
    - ansible_facts["system"] == "Linux"
    - not nomad_client_remove_use_package_manager

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - ansible_facts["system"] == "Linux"
    - not nomad_client_remove_use_package_manager

# --- Direct download removal (macOS) ---

- name: Remove Nomad launchd plist
  ansible.builtin.file:
    path: "{{ nomad_client_remove_launchd_plist_path }}"
    state: absent
  when: ansible_facts["system"] == "Darwin"

# --- Direct download removal (Windows) ---

- name: Remove Nomad Windows service
  ansible.windows.win_service:
    name: "{{ nomad_client_remove_service_name }}"
    state: absent
  when: ansible_facts["os_family"] == "Windows"

- name: Remove Nomad binary (Windows)
  ansible.windows.win_file:
    path: "{{ nomad_client_remove_install_dir }}\\nomad.exe"
    state: absent
  when: ansible_facts["os_family"] == "Windows"

# --- Common cleanup ---

- name: Remove Nomad configuration directory
  ansible.builtin.file:
    path: "{{ nomad_client_remove_config_dir }}"
    state: absent
  when: ansible_facts["os_family"] != "Windows"

- name: Remove Nomad state directory
  ansible.builtin.file:
    path: "{{ nomad_client_remove_state_dir }}"
    state: absent
  when:
    - ansible_facts["os_family"] != "Windows"
    - nomad_client_remove_delete_state | bool

- name: Unmount Nomad allocation mounts (Linux)
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v findmnt >/dev/null 2>&1; then
      while IFS= read -r target; do
        umount -l "$target" || true
      done < <(findmnt -rn -o TARGET | awk '$0 ~ "^{{ (nomad_client_remove_data_dir ~ "/alloc") | regex_escape }}(/|$)"')
    fi
  args:
    executable: /bin/bash
  changed_when: false
  failed_when: false
  when:
    - ansible_facts["system"] == "Linux"
    - nomad_client_remove_delete_state | bool

- name: Remove Nomad allocation mounts directory
  ansible.builtin.file:
    path: "{{ nomad_client_remove_data_dir }}/alloc_mounts"
    state: absent
  when:
    - ansible_facts["os_family"] != "Windows"
    - nomad_client_remove_delete_state | bool

- name: Remove Nomad allocation directory
  ansible.builtin.file:
    path: "{{ nomad_client_remove_data_dir }}/alloc"
    state: absent
  when:
    - ansible_facts["os_family"] != "Windows"
    - nomad_client_remove_delete_state | bool

- name: Remove Nomad data directory
  ansible.builtin.file:
    path: "{{ nomad_client_remove_data_dir }}"
    state: absent
  when:
    - ansible_facts["os_family"] != "Windows"
    - nomad_client_remove_delete_state | bool

- name: Remove Nomad configuration directory (Windows)
  ansible.windows.win_file:
    path: "{{ nomad_client_remove_config_dir }}"
    state: absent
  when: ansible_facts["os_family"] == "Windows"

- name: Remove Nomad state directory (Windows)
  ansible.windows.win_file:
    path: "{{ nomad_client_remove_state_dir }}"
    state: absent
  when:
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_delete_state | bool

- name: Remove Nomad data directory (Windows)
  ansible.windows.win_file:
    path: "{{ nomad_client_remove_data_dir }}"
    state: absent
  when:
    - ansible_facts["os_family"] == "Windows"
    - nomad_client_remove_delete_state | bool
